<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Statewide Delivery Labels - Manifest</title>
    <link href="css/bootstrap.css" rel="stylesheet">
    <link href="css/custom.css" rel="stylesheet">
    <style>
        .table th { white-space: nowrap; }
    </style>
</head>

<body class="bg-light">

<!-- Skip navigation link (visually hidden until focused) -->
<a class="skip-link" href="#main-content">Skip to main content</a>

<header class="container-md pt-4 text-center">
    <img alt="SDS Logo" class="mt-0 mb-3" height="180" src="img/logo.png" width="156">
    <h1>Statewide Delivery Labels</h1>
    <p><em>for Priority Dispatch</em></p>
    <p class="lead">Search the manifest by any keyword.</p>
</header>

<nav aria-label="Site navigation" class="container-md">
    <div class="row justify-content-center">
        <div class="col-md-8">
            <ul class="list-inline d-flex justify-content-end mb-0">
                <li class="list-inline-item"><a href="/index.html" title="Return to home page">Home</a></li>
                <li class="list-inline-item">|</li>
                <li class="list-inline-item">
                    <a href="https://statelibraryofohio.github.io/OhioLINK-Labels/manifest.html"
                       title="Switch to OhioLINK &amp; SearchOhio Labels">OhioLINK Manifest</a>
                </li>
            </ul>
        </div>
    </div>
</nav>

<main id="main-content" class="container-md">

    <div class="row justify-content-center">
        <div class="col-md-8">
            <div class="input-group input-group-lg mb-4">
                <label class="visually-hidden sr-only" for="manifest-search">Search</label>
                <input class="form-control"
                       id="manifest-search"
                       onkeyup="searchManifest();"
                       placeholder="Search any keyword..."
                       type="text"
                       autocomplete="off">
            </div>
        </div>
    </div>

    <div class="row justify-content-center">
        <div class="col-12" id="manifest">
            <!-- table will populate here -->
        </div>
    </div>

</main>

<footer class="container-md py-4 text-center text-muted">
</footer>

<script src="js/bootstrap.bundle.min.js"></script>
<script>
    function fillDivWithJSON(e) {
        for (e, o = [], r = 0; r < e.length; r++) {
            for (e, o = [], r = 0; r < e.length; r++)
                for (let t in e[r]) -1 === o.indexOf(t) && o.push(t);

            let n = document.createElement("table"), a = n.insertRow(-1);
            for (let r = 0; r < o.length; r++) {
                let i = document.createElement("th");
                i.innerHTML = o[r].toUpperCase();
                a.appendChild(i);
            }
            for (let r = 0; r < e.length; r++) {
                a = n.insertRow(-1);
                for (let c = 0; c < o.length; c++) {
                    a.insertCell(-1).innerHTML = e[r][o[c]];
                }
            }
            let l = document.getElementById("manifest");
            n.setAttribute('class', 'table table-sm table-hover');
            l.innerHTML = "";
            l.appendChild(n);
        }
    }

    let xmlhttp = new XMLHttpRequest();
    xmlhttp.onreadystatechange = function () {
        if (this.readyState === 4 && this.status === 200) {
            let e = JSON.parse(this.responseText);

            // columns to display
            let d = ['libid', 'name', 'address', 'city', 'zip', 'seo', 'hub', 'route'];

            // filter to only those columns
            e = e.map(x => {
                let n = {};
                for (let c of d) {
                    n[c] = x[c];
                }
                return n;
            });

            // alphabetize by library name
            e.sort(function (a, b) {
                a = a.name.toLowerCase();
                b = b.name.toLowerCase();
                return a < b ? -1 : a > b ? 1 : 0;
            });

            fillDivWithJSON(e);
            initSearchVars();
        }
    };
    xmlhttp.open("GET", "output.json", true);
    xmlhttp.send();

    let input, table, tr;

    function initSearchVars() {
        input = document.getElementById("manifest-search");
        table = document.querySelector("#manifest table");
        tr = table.getElementsByTagName("tr");
    }

    function searchManifest() {
        let filter = input.value.toUpperCase();
        for (let i = 1; i < tr.length; i++) {
            let td = tr[i].getElementsByTagName("td");
            let visible = false;
            for (let j = 0; j < td.length; j++) {
                if (td[j] && td[j].innerHTML.toUpperCase().indexOf(filter) > -1) {
                    visible = true;
                    break;
                }
            }
            tr[i].style.display = visible ? "" : "none";
        }
    }
</script>
</body>
</html>
