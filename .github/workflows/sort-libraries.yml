name: Sort Libraries JSON

on:
  push:
    branches:
      - main
    paths:
      - output.json
      - sort_libraries.py

permissions:
  contents: write

jobs:
  sort:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Sort libraries alphabetically
        run: python sort_libraries.py output.json

      - name: Commit sorted output
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add output.json
          git diff --staged --quiet && echo "No changes to commit." || (
            git commit -m "chore: auto-sort output.json alphabetically [skip ci]"
            git push
          )
