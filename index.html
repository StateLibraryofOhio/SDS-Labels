<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Statewide Delivery Labels</title>
    <link href="css/bootstrap.css" rel="stylesheet">
    <link href="css/custom.css" rel="stylesheet">
</head>

<body class="bg-light">

<!-- Skip navigation link (visually hidden until focused) -->
<a class="skip-link" href="#main-content">Skip to main content</a>

<header class="container-md pt-4 text-center">
    <img alt="SDS Logo" class="mt-0 mb-3" height="180" src="img/logo.png" width="156">
    <h1>Statewide Delivery Labels</h1>
    <p><em>for Priority Dispatch</em></p>
    <p class="lead">Choose the source and destination for your labels and click &quot;Print&quot;.</p>
</header>

<nav aria-label="Site navigation" class="container-md">
    <div class="row justify-content-center">
        <div class="col-md-8">
            <ul class="list-inline d-flex justify-content-end mb-0">
                <li class="list-inline-item"><a href="/manifest.html" title="View the manifest">Manifest</a></li>
                <li class="list-inline-item">|</li>
                <li class="list-inline-item">
                    <a href="#" title="Create a custom Source label"
                       data-bs-toggle="modal" data-bs-target="#custom-label">Use custom</a>
                </li>
                <li class="list-inline-item">|</li>
                <li class="list-inline-item">
                    <a href="https://statelibraryofohio.github.io/OhioLINK-Labels/"
                       title="Switch to OhioLINK &amp; SearchOhio Labels">OhioLINK Labels</a>
                </li>
            </ul>
        </div>
    </div>
</nav>

<main id="main-content" class="container-md">

    <div class="row justify-content-center">
        <div class="col-md-8">
            <form id="labels" name="labels">
                <div class="mb-3">
                    <label class="form-label" for="source">SOURCE</label>
                    <select id="source" class="form-select form-select-lg" required autocomplete="off">
                        <option disabled selected value="-">Choose a library...</option>
                    </select>
                </div>

                <div class="mb-3">
                    <label class="form-label" for="destination">DESTINATION</label>
                    <select id="destination" class="form-select form-select-lg" required autocomplete="off">
                        <option disabled selected value="-">Choose a library...</option>
                    </select>
                </div>

                <button class="btn btn-lg btn-primary mt-1" id="print-btn" type="button">
                    Print
                </button>
            </form>
        </div>
    </div>

    <div class="row justify-content-center mt-4">
        <div class="col-md-8">
            <h2 class="text-center">Preview</h2>
            <hr>
            <iframe
                    id="output"
                    class="mt-1"
                    src="template.html"
                    title="Label preview"
                    style="width:100%; height:300px;"
                    aria-live="polite"
            ></iframe>
            <hr>
        </div>
    </div>

</main>

<footer class="container-md py-4 text-center text-muted">
</footer>

<!-- Modal for Custom Label -->
<div aria-labelledby="custom-label-title"
     aria-modal="true"
     class="modal fade"
     id="custom-label"
     role="dialog"
     tabindex="-1">
    <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content">

            <div class="modal-header">
                <h2 class="modal-title h5" id="custom-label-title">Custom Label</h2>
                <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
            </div>

            <form class="row g-3 m-4" id="custom-label-form" novalidate>
                <div class="col-md-3">
                    <label class="form-label" for="custom-libid">ID</label>
                    <input class="form-control"
                           id="custom-libid"
                           type="text"
                           autocomplete="off">
                </div>
                <div class="col-md-9">
                    <label class="form-label" for="custom-name">Name</label>
                    <input class="form-control"
                           id="custom-name"
                           type="text"
                           autocomplete="organization">
                </div>
                <div class="col-12">
                    <label class="form-label" for="custom-address">Address</label>
                    <input class="form-control"
                           id="custom-address"
                           placeholder="1234 Main St"
                           type="text"
                           autocomplete="street-address">
                </div>
                <div class="col-md-6">
                    <label class="form-label" for="custom-city">City</label>
                    <input class="form-control"
                           id="custom-city"
                           type="text"
                           autocomplete="address-level2">
                </div>
                <div class="col-md-3">
                    <label class="form-label" for="custom-state">State</label>
                    <select class="form-select"
                            id="custom-state"
                            autocomplete="address-level1">
                        <option value="OH">OH</option>
                    </select>
                </div>
                <div class="col-md-3">
                    <label class="form-label" for="custom-zip">Zip</label>
                    <input class="form-control"
                           id="custom-zip"
                           type="text"
                           inputmode="numeric"
                           autocomplete="postal-code">
                </div>
                <div class="col-12">
                    <button class="btn btn-primary float-end" type="submit">Submit</button>
                </div>
            </form>
        </div>
    </div>
</div>

<script src="js/bootstrap.bundle.min.js"></script>
<script src="js/taffy-min.js"></script>
<script defer src="js/app.js"></script>
</body>
</html>
